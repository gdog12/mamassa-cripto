name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Generate Icon
      run: |
        python -m pip install --upgrade pip
        pip install Pillow
        python generate_icon.py

    - name: Install Dependencies
      run: |
        pip install PyQt5 requests pyqtgraph pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=mmswc_icon.ico --name="MaMassa_Cripto" --collect-all PyQt5 --hidden-import PyQt5.sip --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui --hidden-import PyQt5.QtWidgets cripto.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MaMassa-Cripto-Windows
        path: dist/MaMassa_Cripto.exe
